name: CI / Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# Only one release workflow at a time to avoid race conditions on the same GitHub Release
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  # ─────────────────────────────────────────────────────────
  # 1. Test & Lint (fast, runs first)
  # ─────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          NODE_ENV: development

      - name: TypeScript check (tsc)
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

  # ─────────────────────────────────────────────────────────
  # 2. Build (all platforms, no publish — runs on every push/PR)
  # ─────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    needs: [test]
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            build-args: --linux
          - os: macos-latest
            build-args: --mac
          - os: windows-latest
            build-args: --win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          NODE_ENV: development

      - name: Build app
        run: npm run build

      - name: Package installer
        run: npx electron-builder ${{ matrix.build-args }}

  # ─────────────────────────────────────────────────────────
  # 3. Release — build + publish on tag push (v*)
  # ─────────────────────────────────────────────────────────
  release:
    name: Release (${{ matrix.os }})
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            build-args: --linux
          - os: macos-latest
            build-args: --mac
          - os: windows-latest
            build-args: --win
    runs-on: ${{ matrix.os }}
    # Grant the built-in GITHUB_TOKEN write access to create releases
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          NODE_ENV: development

      # Sync version from git tag (e.g. "v0.2.0" -> "0.2.0") into package.json
      # so electron-builder packages with the correct version number.
      - name: Set app version from tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting package version to: $TAG_VERSION"
          npm version "$TAG_VERSION" --no-git-tag-version --allow-same-version

      - name: Build app
        run: npm run build

      - name: Package & publish to GitHub Releases
        run: npx electron-builder ${{ matrix.build-args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload installer artifacts so they're also visible in the run summary
      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}-${{ github.ref_name }}
          path: release/
          if-no-files-found: ignore
